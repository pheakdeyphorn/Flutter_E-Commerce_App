<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pheakdey Store | Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="sidebar d-flex flex-column p-3">
      <h3 class="text-center mb-4 text-primary">Pheakdey Admin</h3>
      <ul class="nav nav-pills flex-column mb-auto">
        <li>
          <a
            onclick="showSection('dashboard')"
            id="nav-dashboard"
            class="nav-link active"
            ><i class="bi bi-speedometer2 me-2"></i> Dashboard</a
          >
        </li>
        <li>
          <a onclick="showSection('users')" id="nav-users" class="nav-link"
            ><i class="bi bi-people me-2"></i> Users</a
          >
        </li>
        <li>
          <a
            onclick="showSection('products')"
            id="nav-products"
            class="nav-link"
            ><i class="bi bi-box-seam me-2"></i> Products</a
          >
        </li>
      </ul>
      <hr />
      <div class="text-center"><small>© 2026 Pheakdey Store</small></div>
    </div>

    <div class="main-content">
      <header class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="section-title">Management Dashboard</h2>
        <span class="badge bg-success">Server: Online</span>
      </header>

      <div id="section-dashboard">
        <div class="row">
          <div class="col-md-5 mb-4">
            <div class="card p-4">
              <h5 class="mb-3 text-primary">
                <i class="bi bi-person-plus me-2"></i>Create New User
              </h5>
              <input
                type="text"
                id="uName"
                class="form-control mb-2"
                placeholder="Full Name"
              />
              <input
                type="email"
                id="uEmail"
                class="form-control mb-2"
                placeholder="Email"
              />
              <input
                type="password"
                id="uPass"
                class="form-control mb-3"
                placeholder="Password"
              />
              <button onclick="addUser()" class="btn btn-primary w-100">
                Add User
              </button>
            </div>
          </div>
          <div class="col-md-7 mb-4">
            <div class="card p-4">
              <h5 class="mb-3 text-primary">
                <i class="bi bi-plus-circle me-2"></i>Add/Edit Product
              </h5>
              <input type="hidden" id="pId" />
              <div class="row">
                <div class="col-md-8">
                  <input
                    type="text"
                    id="pName"
                    class="form-control mb-2"
                    placeholder="Product Name"
                  />
                </div>
                <div class="col-md-4">
                  <input
                    type="number"
                    id="pPrice"
                    class="form-control mb-2"
                    placeholder="Price"
                  />
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <select id="pCategory" class="form-select mb-2">
                    <option value="Other">Select Category</option>
                    <option value="Keyboard">Keyboard</option>
                    <option value="Mice">Mice</option>
                    <option value="Audio">Audio</option>
                    <option value="Storage">Storage</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <input
                    type="number"
                    id="pStock"
                    class="form-control mb-2"
                    placeholder="Stock"
                    value="10"
                  />
                </div>
              </div>
              <input
                type="text"
                id="pImage"
                class="form-control mb-2"
                placeholder="Image URL"
              />
              <textarea
                id="pDesc"
                class="form-control mb-2"
                placeholder="Description"
                rows="2"
              ></textarea>
              <div class="form-check form-switch mb-3">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="pTrending"
                />
                <label class="form-check-label">Mark as Trending</label>
              </div>
              <button
                id="btn-product-action"
                onclick="addProduct()"
                class="btn btn-dark w-100"
              >
                Publish Product
              </button>
              <button
                id="btn-cancel-edit"
                onclick="resetProductForm()"
                class="btn btn-link w-100 mt-2 hidden"
              >
                Cancel Edit
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="section-users" class="hidden">
        <div class="card p-4">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Balance</th>
              </tr>
            </thead>
            <tbody id="user-list"></tbody>
          </table>
        </div>
      </div>

      <div id="section-products" class="hidden">
        <div class="card p-4">
          <div class="row mb-3">
            <div class="col-md-6">
              <input
                type="text"
                id="pSearch"
                class="form-control"
                placeholder="Search products..."
                onkeyup="filterProducts()"
              />
            </div>
            <div class="col-md-4">
              <select
                id="pFilterCategory"
                class="form-select"
                onchange="filterProducts()"
              >
                <option value="All">All Categories</option>
                <option value="Keyboard">Keyboard</option>
                <option value="Mice">Mice</option>
                <option value="Audio">Audio</option>
                <option value="Storage">Storage</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="product-list"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
